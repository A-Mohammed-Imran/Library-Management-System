<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library Management System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a href="{{ url_for('home') }}" class="brand">ShelfSpark</a>
            <button id="menuToggle" class="menu-toggle" type="button" aria-label="Toggle navigation">
                Menu
            </button>
            <ul id="navLinks" class="nav-links">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('add_book') }}">Add Book</a></li>
                <li><a href="{{ url_for('view_books') }}">View Books</a></li>
                <li><a href="{{ url_for('search_books') }}">Search</a></li>
            </ul>
        </nav>
    </header>

    <main class="container page-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
